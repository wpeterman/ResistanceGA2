name: package-check

on:
  push:
    branches:
      - main
      - master
      - dev
      - "codex/**"
    paths:
      - "DESCRIPTION"
      - "NAMESPACE"
      - "NEWS"
      - "R/**"
      - "man/**"
      - "tests/**"
      - "vignettes/**"
      - "src/**"
      - "inst/**"
      - "data/**"
      - ".Rbuildignore"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "DESCRIPTION"
      - "NAMESPACE"
      - "NEWS"
      - "R/**"
      - "man/**"
      - "tests/**"
      - "vignettes/**"
      - "src/**"
      - "inst/**"
      - "data/**"
      - ".Rbuildignore"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libglpk-dev

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::devtools
          needs: check

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
